name: test
on:
- push
- pull_request
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        ruby-version:
        - '3.4.5'
        - jruby-10.0.5.0
        runs-on:
        - ubuntu-latest

    runs-on: ${{ matrix.runs-on }}

    steps:

    - uses: actions/checkout@v2

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true

    - run: bundle install && bundle exec rake test
